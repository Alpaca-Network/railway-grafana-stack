name: Validate & Test

on:
  push:
    branches:
      - main
      - refactor/**
  pull_request:
    branches:
      - main

jobs:
  validate-json:
    name: Validate JSON Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Validate dashboard JSON
        run: |
          python3 << 'EOF'
          import json
          import glob
          import sys
          
          errors = []
          for file in glob.glob('grafana/dashboards/*.json'):
              try:
                  with open(file, 'r') as f:
                      json.load(f)
                  print(f"✓ {file}")
              except json.JSONDecodeError as e:
                  errors.append(f"✗ {file}: {e}")
                  print(f"✗ {file}: {e}")
          
          if errors:
              sys.exit(1)
          EOF
      
      - name: Validate YAML files
        run: |
          python3 -m pip install pyyaml > /dev/null 2>&1
          python3 << 'EOF'
          import yaml
          import glob
          import sys
          
          errors = []
          for file in glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True):
              if '.git' in file:
                  continue
              try:
                  with open(file, 'r') as f:
                      yaml.safe_load(f)
                  print(f"✓ {file}")
              except yaml.YAMLError as e:
                  errors.append(f"✗ {file}: {e}")
                  print(f"✗ {file}: {e}")
          
          if errors:
              sys.exit(1)
          EOF

  dashboard-validation:
    name: Validate Dashboard Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dashboard validation script
        run: |
          chmod +x scripts/validate_dashboards.sh
          ./scripts/validate_dashboards.sh strict

      - name: Run dashboard pytest tests
        run: |
          pytest tests/test_dashboards.py -v --tb=short -m dashboard

      - name: Verify all dashboards have unique UIDs
        run: |
          python << 'EOF'
          import json
          import glob
          from pathlib import Path

          dashboards_dir = Path('grafana/dashboards')
          uids = {}
          errors = []

          for json_file in sorted(dashboards_dir.glob('*.json')):
              with open(json_file, 'r') as f:
                  dashboard = json.load(f)

              uid = dashboard.get('uid', 'MISSING')
              if uid in uids:
                  errors.append(f"Duplicate UID '{uid}': {json_file.name} and {uids[uid]}")
              else:
                  uids[uid] = json_file.name

          if errors:
              print("❌ Duplicate UIDs found:")
              for error in errors:
                  print(f"  - {error}")
              exit(1)
          else:
              print(f"✅ All {len(uids)} dashboards have unique UIDs")
          EOF

  lint-docker:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: prometheus/Dockerfile
          ignore: DL3008,DL3009,DL3002
      
      - name: Run Hadolint - Loki
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: loki/Dockerfile
          ignore: DL3008,DL3009,DL3002
      
      - name: Run Hadolint - Tempo
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: tempo/Dockerfile
          ignore: DL3008,DL3009,DL3002
      
      - name: Run Hadolint - Grafana
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: grafana/Dockerfile
          ignore: DL3008,DL3009,DL3002

      - name: Run Hadolint - Mimir
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: mimir/Dockerfile
          ignore: DL3008,DL3009,DL3002

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: prometheus
            context: ./prometheus
            dockerfile: ./prometheus/Dockerfile
          - name: loki
            context: ./loki
            dockerfile: ./loki/Dockerfile
          - name: tempo
            context: ./tempo
            dockerfile: ./tempo/Dockerfile
          - name: grafana
            context: ./grafana
            dockerfile: ./grafana/Dockerfile
          - name: mimir
            context: ./mimir
            dockerfile: ./mimir/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-docker-compose:
    name: Test Docker Compose Stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to start..."
          sleep 45

      - name: Health check - Grafana
        run: |
          curl -sf http://localhost:3000/api/health && echo "✅ Grafana healthy" || echo "⚠️ Grafana not ready"

      - name: Health check - Prometheus
        run: |
          curl -sf http://localhost:9090/-/healthy && echo "✅ Prometheus healthy" || echo "⚠️ Prometheus not ready"

      - name: Health check - Loki
        run: |
          curl -sf http://localhost:3100/ready && echo "✅ Loki healthy" || echo "⚠️ Loki not ready"

      - name: Health check - Tempo
        run: |
          curl -sf http://localhost:3200/status && echo "✅ Tempo healthy" || echo "⚠️ Tempo not ready"

      - name: Health check - Mimir
        run: |
          curl -sf http://localhost:9009/ready && echo "✅ Mimir healthy" || echo "⚠️ Mimir not ready"

      - name: Health check - Alertmanager
        run: |
          curl -sf http://localhost:9093/-/healthy && echo "✅ Alertmanager healthy" || echo "⚠️ Alertmanager not ready"

      - name: Health check - Pyroscope
        run: |
          curl -sf http://localhost:4040/ready && echo "✅ Pyroscope healthy" || echo "⚠️ Pyroscope not ready"

      - name: Service status report
        if: always()
        run: |
          echo "=== Docker Compose Service Status ==="
          docker compose ps

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true

  check-config:
    name: Check Configuration Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify required files exist
        run: |
          files=(
            "docker-compose.yml"
            "prometheus/Dockerfile"
            "loki/Dockerfile"
            "tempo/Dockerfile"
            "grafana/Dockerfile"
            "grafana/dashboards/dashboards.yml"
          )
          
          for file in "${files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "✗ Missing required file: $file"
              exit 1
            fi
            echo "✓ Found $file"
          done
