# Tempo 2.6.1 - Configuration optimized for Railway
# Updated: High-cardinality AI tracing — expanded span metrics, local_blocks processor, LLM histogram buckets
stream_over_http_enabled: true

server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  http_listen_address: "0.0.0.0"
  grpc_listen_address: "0.0.0.0"

# OTLP receivers for trace ingestion
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  # Shorter block duration for faster trace visibility
  max_block_duration: 1m
  trace_idle_period: 5s
  flush_check_period: 5s
  # Complete blocks faster for search availability
  complete_block_timeout: 30s

# Metrics Generator - Creates span metrics for Prometheus
# This enables the traces_spanmetrics_* metrics for "most popular models" queries
# Remote writes metrics to Mimir for long-term storage and querying
metrics_generator:
  # Ring configuration for metrics generator (required for Tempo 2.6.1)
  ring:
    kvstore:
      store: inmemory
  registry:
    external_labels:
      source: tempo
      cluster: gatewayz
    stale_duration: 15m
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      # MIMIR_REMOTE_WRITE_URL is substituted by entrypoint.sh
      # Railway: http://mimir.railway.internal:9009/api/v1/push
      # Local: http://mimir:9009/api/v1/push
      - url: MIMIR_REMOTE_WRITE_URL
        send_exemplars: true
    remote_write_flush_deadline: 1m
  traces_storage:
    path: /var/tempo/generator/traces
  processor:
    span_metrics:
      # Core LLM dimensions for model/provider analytics
      dimensions:
        - service.name
        - span_name
        - gen_ai.request.model
        - gen_ai.system
        - ai.provider
        - ai.model_id
        - customer.id           # WARNING: monitor cardinality; remove if >200 distinct customers
        - http.status_code
        # --- Phase 2: high-cardinality AI analytics dimensions ---
        - gen_ai.response.finish_reason   # ≤5 values: stop/length/tool_calls/content_filter/null
        - http.route                      # ~15–25 API routes; enables per-endpoint error breakdown
        - error.type                      # ~10–15 error class names; enables root-cause grouping
        - span.kind                       # 5 values: server/client/internal/producer/consumer
        - db.system                       # 3–5 values: postgresql/redis/supabase
        # NOTE: gen_ai.usage.prompt_tokens and gen_ai.usage.completion_tokens are NUMERIC and
        # must NOT be dimensions. Read them from trace spans directly via TraceQL (dashboard panels 703).
      enable_target_info: true
      # LLM-tuned histogram buckets: extended to 120s to capture slow large-model calls.
      # Previous max was 10s — any LLM call exceeding 10s reported P95/P99 as +Inf.
      histogram_buckets: [0.05, 0.1, 0.25, 0.5, 1, 2, 5, 10, 20, 30, 60, 120]
      # Exclude health check and scrape spans from span metrics to keep analytics
      # focused on AI workloads. Exclude-only: an include block would silently
      # drop all spans that lack http.route (background tasks, DB spans, etc).
      filter_policies:
        - exclude:
            match_type: regexp
            attributes:
              - key: http.route
                value: "(^/health.*|^/metrics.*|^/ready.*|^/live.*|^/ping$|^/favicon.*)"
              - key: http.target
                value: "(^/health.*|^/metrics.*|^/ready.*|^/live.*)"
              - key: span_name
                value: "(health_check|metrics_scrape|readiness_probe|liveness_probe)"
    # Service graphs: maps service-to-service call topology.
    # peer_attributes creates virtual nodes for external APIs (OpenAI, Anthropic, Supabase)
    # that don't emit their own spans — they become named nodes in the service graph.
    service_graphs:
      dimensions:
        - service.name
        - gen_ai.system
        - gen_ai.request.model    # which model on each service edge
        - http.status_code        # status code per service-to-service edge
      # Maps span attributes to virtual service node names for external dependencies
      peer_attributes:
        - server.address          # HTTP client spans → named external API nodes (api.openai.com etc.)
        - db.name                 # DB client spans → named database nodes
      enable_database_calls: true # creates dedicated DB nodes in service topology
      max_items: 10000            # caps graph size to prevent unbounded growth on Railway
      wait: 10s
    # local_blocks: enables TraceQL metrics queries ({ } | rate(), | sum(), | quantile_over_time())
    # directly against local Parquet blocks WITHOUT going through Mimir.
    # Required for dashboard panels 701–703 (live TraceQL metrics and token usage analytics).
    # Memory impact: +30–50MB RSS for WAL + block index. Monitor Tempo memory in Railway dashboard.
    # If container memory approaches 450MB, reduce max_live_traces to 5000.
    local_blocks:
      max_live_traces: 10000         # cap in-memory trace count for local_blocks scanning
      max_block_bytes: 524288000     # 500MB max per block consumed by this processor
      max_block_duration: 30m        # how long to keep a block available for TraceQL metric queries
      flush_check_period: 10s
      filter_server_spans: false     # include server spans in TraceQL metrics (needed for AI gateway spans)

# Overrides for high-cardinality attributes
overrides:
  defaults:
    metrics_generator:
      processors: [span-metrics, service-graphs, local-blocks]
      generate_native_histograms: both
    # Trace size guards: protects against runaway traces (e.g. very long agent/tool-call chains).
    # An AI gateway trace with many tool calls + streaming events can reach 1–3MB.
    # 5MB gives headroom for large traces while blocking truly pathological ones.
    max_bytes_per_trace: 5242880          # 5MB per trace
    max_search_bytes_per_trace: 5242880   # 5MB search index per trace (for TraceQL queries)

compactor:
  compaction:
    block_retention: 48h

# Querier configuration for Tempo 2.6.1
querier:
  max_concurrent_queries: 20
  frontend_worker:
    frontend_address: ""

# Query Frontend configuration for TraceQL
query_frontend:
  search:
    duration_slo: 5s
    concurrent_jobs: 2000
  trace_by_id:
    duration_slo: 5s

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000
    # Block configuration for search
    block:
      # vParquet4 enables efficient TraceQL queries
      version: vParquet4
