apiVersion: 1

# Trace-based alert rules — derived from Tempo span metrics in Mimir
# All queries use traces_spanmetrics_* metrics generated by Tempo's metrics_generator
# and remote-written directly to Mimir (NOT scraped by Prometheus).
#
# Dimension dependencies:
#   - Alerts 1–3 work immediately (dimensions already exist in Mimir)
#   - Alerts 4–6 depend on new dimensions added in tempo.yml Phase 2:
#     gen_ai.response.finish_reason → finish_reason label
#     http.route → http_route label
#   These alerts use noDataState: NoData — they are silent until the new
#   dimensions appear in Mimir (expected after first traces arrive post-deploy).

groups:
  - orgId: 1
    name: trace_alerts
    folder: Trace Alerts
    interval: 1m
    rules:

      # -----------------------------------------------------------------------
      # Alert 1: High Span Error Rate by Provider
      # Fires when a specific AI provider's span error rate exceeds 20% for 5m.
      # Works immediately — uses existing ai_provider dimension.
      # 20% threshold avoids noise from transient retries; lower to 10% if desired.
      # -----------------------------------------------------------------------
      - uid: trace_provider_high_error_rate
        title: AI Provider High Span Error Rate
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'AI provider {{ $labels.ai_provider }} error rate above 20%'
          description: >
            Provider {{ $labels.ai_provider }} has a span error rate of {{ $value | humanizePercentage }}
            over the last 5 minutes. This indicates systematic failures — not transient retries.
            Check provider status page and backend logs for this provider.
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/trace-provider-errors'
        labels:
          severity: warning
          category: traces
          component: ai_provider
        data:
          - refId: A
            queryType: ''
            model:
              expr: |
                (
                  sum(rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m])) by (ai_provider)
                  /
                  clamp_min(sum(rate(traces_spanmetrics_calls_total[5m])) by (ai_provider), 0.001)
                )
              hide: false
              intervalFactor: 1
              legendFormat: '{{ ai_provider }}'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params: [0.20]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions

      # -----------------------------------------------------------------------
      # Alert 2: P95 Latency Degradation by Model
      # Fires when a model's 95th percentile span latency exceeds 10 seconds.
      # Requires the extended histogram buckets (Phase 1: added 20/30/60/120s buckets)
      # so that histogram_quantile returns accurate values for slow LLM calls.
      # 10s: fast models (P95 < 3s normal), large models (P95 < 8s normal) → 10s = degraded.
      # -----------------------------------------------------------------------
      - uid: trace_model_p95_latency_high
        title: AI Model P95 Latency Degradation
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'Model {{ $labels.gen_ai_request_model }} P95 latency exceeds 10s'
          description: >
            Model {{ $labels.gen_ai_request_model }} (provider: {{ $labels.ai_provider }})
            has a P95 span latency of {{ $value }}s, above the 10s threshold.
            This may indicate provider API degradation, large context loads, or upstream
            rate limiting. Check provider status and recent token usage trends.
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/trace-model-latency'
        labels:
          severity: warning
          category: traces
          component: ai_model_performance
        data:
          - refId: A
            queryType: ''
            model:
              expr: |
                histogram_quantile(
                  0.95,
                  sum(rate(traces_spanmetrics_latency_bucket[5m])) by (le, gen_ai_request_model, ai_provider)
                )
              hide: false
              intervalFactor: 1
              legendFormat: '{{ gen_ai_request_model }} ({{ ai_provider }})'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions

      # -----------------------------------------------------------------------
      # Alert 3: Provider Completely Dark (Zero Spans)
      # Fires when a previously-active provider emits zero spans for 5 minutes.
      # noDataState: Alerting — absence of the metric IS the alerting condition.
      # The `or vector(0)` pattern detects both zero-value AND absent series.
      # More actionable than TempoNoTraces because it is per-provider.
      # -----------------------------------------------------------------------
      - uid: trace_provider_dark
        title: AI Provider Dark (Zero Spans)
        condition: C
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'AI provider {{ $labels.ai_provider }} has emitted zero spans'
          description: >
            Provider {{ $labels.ai_provider }} has produced zero span metrics for 5 minutes,
            despite being active in the last hour. Possible causes: (1) backend stopped routing
            to this provider, (2) spans stopped being emitted, or (3) metrics_generator stale
            series were evicted. Cross-check with backend logs for {{ $labels.ai_provider }}.
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/trace-provider-dark'
        labels:
          severity: critical
          category: traces
          component: ai_provider
        data:
          - refId: A
            queryType: ''
            model:
              expr: |
                (
                  sum(rate(traces_spanmetrics_calls_total[5m])) by (ai_provider)
                  or
                  (0 * sum(rate(traces_spanmetrics_calls_total[1h])) by (ai_provider))
                )
              hide: false
              intervalFactor: 1
              legendFormat: '{{ ai_provider }}'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params: [0.001]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions

      # -----------------------------------------------------------------------
      # Alert 4: Truncated Completions Spike (finish_reason=length)
      # Fires when >30% of completions are truncated due to context/token limits.
      # High "length" finish_reason = callers sending over-long prompts or
      # max_tokens configured too low for the model being used.
      # DEPENDS ON: gen_ai.response.finish_reason dimension (Phase 2 deployment).
      # noDataState: NoData — silent until dimension appears in Mimir.
      # -----------------------------------------------------------------------
      - uid: trace_finish_reason_length_spike
        title: AI Model Truncated Completions Spike
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          summary: 'Model {{ $labels.gen_ai_request_model }} exceeding context limits (>30% truncated)'
          description: >
            {{ $value | humanizePercentage }} of completions from model {{ $labels.gen_ai_request_model }}
            are finishing with reason=length, meaning output was truncated at max_tokens.
            Callers may be sending excessively long prompts or max_tokens is configured too low.
            Inspect gen_ai.usage.prompt_tokens distribution in trace spans for this model.
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/trace-completion-truncation'
        labels:
          severity: warning
          category: traces
          component: ai_model_quality
        data:
          - refId: A
            queryType: ''
            model:
              expr: |
                (
                  sum(rate(traces_spanmetrics_calls_total{finish_reason="length"}[10m])) by (gen_ai_request_model)
                  /
                  clamp_min(
                    sum(rate(traces_spanmetrics_calls_total{finish_reason=~".+"}[10m])) by (gen_ai_request_model),
                    0.001
                  )
                )
              hide: false
              intervalFactor: 1
              legendFormat: '{{ gen_ai_request_model }}'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params: [0.30]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions

      # -----------------------------------------------------------------------
      # Alert 5: Per-Route Error Rate Spike
      # Fires when a specific HTTP route has >30% span error rate for 5 minutes.
      # Isolates which endpoint is broken while others remain healthy.
      # DEPENDS ON: http.route dimension (Phase 2 deployment).
      # -----------------------------------------------------------------------
      - uid: trace_route_error_rate_spike
        title: API Route High Error Rate (Span Metrics)
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'Route {{ $labels.http_route }} error rate above 30%'
          description: >
            HTTP route {{ $labels.http_route }} has a span error rate of {{ $value | humanizePercentage }}
            over the last 5 minutes. This is isolated to this endpoint — other routes may be healthy.
            Check recent deployments to this route handler and error classification in traces.
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/trace-route-errors'
        labels:
          severity: warning
          category: traces
          component: api_routing
        data:
          - refId: A
            queryType: ''
            model:
              expr: |
                (
                  sum(rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR", http_route!=""}[5m])) by (http_route)
                  /
                  clamp_min(
                    sum(rate(traces_spanmetrics_calls_total{http_route!=""}[5m])) by (http_route),
                    0.001
                  )
                )
              hide: false
              intervalFactor: 1
              legendFormat: '{{ http_route }}'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params: [0.30]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions

      # -----------------------------------------------------------------------
      # Alert 6: Content Filter Spike (Safety / Compliance Signal)
      # Fires when >5% of completions are blocked by provider content moderation.
      # This is a safety, compliance, and potential prompt-injection signal.
      # DEPENDS ON: gen_ai.response.finish_reason dimension (Phase 2 deployment).
      # -----------------------------------------------------------------------
      - uid: trace_content_filter_spike
        title: AI Completions Hitting Content Filter
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          summary: 'Content filter firing on >5% of completions from {{ $labels.gen_ai_request_model }}'
          description: >
            {{ $value | humanizePercentage }} of completions from model {{ $labels.gen_ai_request_model }}
            (provider: {{ $labels.ai_provider }}) are finishing with reason=content_filter.
            This may indicate: (1) prompt injection attempts by users, (2) policy violations in
            customer inputs, or (3) overly strict provider moderation. Review traces with
            finish_reason=content_filter immediately.
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/trace-content-filter'
        labels:
          severity: critical
          category: traces
          component: ai_safety
        data:
          - refId: A
            queryType: ''
            model:
              expr: |
                (
                  sum(rate(traces_spanmetrics_calls_total{finish_reason="content_filter"}[5m])) by (gen_ai_request_model, ai_provider)
                  /
                  clamp_min(
                    sum(rate(traces_spanmetrics_calls_total{finish_reason=~".+"}[5m])) by (gen_ai_request_model, ai_provider),
                    0.001
                  )
                )
              hide: false
              intervalFactor: 1
              legendFormat: '{{ gen_ai_request_model }} ({{ ai_provider }})'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params: [0.05]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              type: classic_conditions
