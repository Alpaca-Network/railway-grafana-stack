apiVersion: 1

groups:
  - orgId: 1
    name: logs_alerts
    folder: Logs Alerts
    interval: 1m
    rules:
      # Alert: Critical Errors Detected
      - uid: critical_errors_detected
        title: Critical Errors Detected
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          description: '{{ $value }} critical errors detected in the last 5 minutes. Review logs immediately.'
          summary: 'Critical errors detected'
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/critical-errors'
        labels:
          severity: critical
          category: logs
          component: error_tracking
        data:
          - refId: A
            queryType: ''
            model:
              expr: 'sum(critical_error_count_5m) > 10'
              hide: false
              intervalFactor: 1
              legendFormat: 'Critical Errors'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  type: query
              type: threshold

      # Alert: Error Rate Spike
      - uid: error_rate_spike
        title: Error Rate Spike
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        annotations:
          description: 'Error rate increased {{ $value }}% compared to 1 hour ago. Investigate error logs.'
          summary: 'Error rate spike detected'
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/error-spike'
        labels:
          severity: warning
          category: logs
          component: error_tracking
        data:
          - refId: A
            queryType: ''
            model:
              expr: '((avg(error_rate_now) - avg(error_rate_1h_ago)) / avg(error_rate_1h_ago) * 100) > 50'
              hide: false
              intervalFactor: 1
              legendFormat: 'Error Rate Change %'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  type: query
              type: threshold

      # Alert: Latency Degradation
      - uid: logs_latency_degradation
        title: Latency Degradation
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 10m
        annotations:
          description: 'System latency increased {{ $value }}% compared to 1 hour ago. Check backend performance.'
          summary: 'Latency degradation detected'
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/latency-degradation'
        labels:
          severity: warning
          category: logs
          component: performance_monitoring
        data:
          - refId: A
            queryType: ''
            model:
              expr: '((avg(latency_now) - avg(latency_1h_ago)) / avg(latency_1h_ago) * 100) > 50'
              hide: false
              intervalFactor: 1
              legendFormat: 'Latency Change %'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  type: query
              type: threshold

      # Alert: Anomaly Count High
      - uid: anomaly_count_high
        title: Anomaly Count High
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 0m
        annotations:
          description: '{{ $value }} anomalies detected. Multiple issues detected in the system.'
          summary: 'High anomaly count'
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/anomaly-spike'
        labels:
          severity: critical
          category: logs
          component: anomaly_detection
        data:
          - refId: A
            queryType: ''
            model:
              expr: 'sum(anomaly_count) > 5'
              hide: false
              intervalFactor: 1
              legendFormat: 'Anomaly Count'
              refId: A
          - refId: C
            queryType: ''
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  type: query
              type: threshold
      # Alert: Loki No Ingestion (Loki-native)
      - uid: loki_no_ingestion
        title: Loki No Ingestion
        condition: C
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        annotations:
          description: 'No logs received from GatewayZ backend in the last 5 minutes. The backend log push to Loki may be broken.'
          summary: 'Loki log ingestion stopped — backend may be down or log push is failing'
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/loki-no-ingestion'
        labels:
          severity: critical
          category: logs
          component: loki_ingestion
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: grafana_loki
            model:
              expr: 'sum(rate({app=~"gatewayz.*"}[5m]))'
              hide: false
              intervalFactor: 1
              legendFormat: 'Log Ingestion Rate'
              refId: A
              queryType: ''
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              refId: B
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: replaceNN
                replaceWithValue: 0
          - refId: C
            queryType: ''
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.001
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  type: query
              type: threshold
              refId: C
              expression: B

      # Alert: Loki Error Burst (Loki-native)
      - uid: loki_error_burst
        title: Loki Error Burst
        condition: C
        noDataState: NoData
        execErrState: Alerting
        for: 1m
        annotations:
          description: '{{ $value }} ERROR log lines detected in the last minute. Rapid error spike — investigate immediately.'
          summary: 'ERROR log burst detected — high volume of errors in 1 minute'
          runbook_url: 'https://wiki.gatewayz.ai/runbooks/loki-error-burst'
        labels:
          severity: warning
          category: logs
          component: loki_ingestion
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: grafana_loki
            model:
              expr: 'sum(count_over_time({app=~"gatewayz.*"} |= "ERROR" [1m]))'
              hide: false
              intervalFactor: 1
              legendFormat: 'ERROR Lines / 1m'
              refId: A
              queryType: ''
          - refId: B
            queryType: ''
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              refId: B
              type: reduce
              expression: A
              reducer: last
          - refId: C
            queryType: ''
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 50
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  type: query
              type: threshold
              refId: C
              expression: B
    provenance: Grafana
