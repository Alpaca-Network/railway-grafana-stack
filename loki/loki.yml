auth_enabled: false

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3100
  log_level: warn
  grpc_listen_address: 0.0.0.0
  grpc_listen_port: 9096
  grpc_server_max_recv_msg_size: 16777216
  grpc_server_max_send_msg_size: 16777216

common:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /loki

schema_config:
  configs:
  - from: 2025-01-01
    index:
      period: 24h
      prefix: index_
    store: tsdb
    object_store: filesystem
    schema: v13

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_streams_per_user: 10000
  max_global_streams_per_user: 10000
  # Retention: Delete logs older than 30 days to prevent infinite disk growth
  retention_period: 720h  # 30 days

# Compactor configuration for log retention
compactor:
  working_directory: /loki/compactor
  # Loki 3.4 breaking change: `shared_store` removed.
  # When retention is enabled, Loki requires `delete_request_store`.
  delete_request_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Loki TSDB (schema v13+) uses compactor-based retention.
# `table_manager` retention settings are legacy and should not be used with TSDB.

distributor:
  ring:
    kvstore:
      store: inmemory

# ============================================================
# Ruler configuration for recording rules
# Evaluates LogQL rules and remote-writes derived metrics to Mimir
# Pattern matches Tempo's metrics_generator -> Mimir remote_write
# ============================================================
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/ruler-wal
  ring:
    kvstore:
      store: inmemory
    instance_addr: 127.0.0.1
  enable_api: true
  enable_alertmanager_v2: false
  remote_write:
    enabled: true
    client:
      url: MIMIR_REMOTE_WRITE_URL
      headers:
        X-Scope-OrgID: anonymous
      queue_config:
        capacity: 5000
        max_shards: 10
        max_samples_per_send: 1000
        batch_send_deadline: 5s
    config_refresh_period: 10s
  evaluation_interval: 1m
  poll_interval: 1m
